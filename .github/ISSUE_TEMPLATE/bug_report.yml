name: Bug report
description: Report a reproducible problem in smath
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        Please provide enough detail for us to reproduce and diagnose the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Include a minimal code snippet or steps to reproduce.
      render: cpp
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: Compiler and version
      placeholder: e.g. clang 18.1.8, GCC 14.2, MSVC 19.40
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: e.g. macOS 15 arm64, Ubuntu 24.04 x86_64, Windows 11
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add logs, screenshots, or links if relevant.
